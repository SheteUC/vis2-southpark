<!doctype html>
<html lang="en" data-theme="dark">
<head>

  />

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link

  <link rel="stylesheet" href="/styles.css" />

<body>
  <header class="site-header app-header" role="banner">
    <a href="#overview-start" class="logo-link" aria-label="South Park Dialogue Anatomy overview">
      <svg class="logo-mountain" viewBox="0 0 32 26" width="32" height="26" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,26 4,18 10,22 16,10 22,20 28,14 32,18 32,26" fill="currentColor" opacity="0.22"/>

        <polygon points="3,16 5,14 7,16" fill="white" opacity="0.70"/>

      <div class="logo-sign" aria-label="South Park">
        <span class="logo-sign-main">South Park</span>
        <span class="logo-sign-sub">Dialogue Anatomy</span>

  <div id="tooltip" class="tooltip" role="tooltip" aria-live="polite" hidden></div>

  <footer class="site-footer">
    <p>
      Data:
      <a href="https://github.com/yaylinda/south-park-dialog" target="_blank" rel="noopener">South Park dialogue dataset</a>
      • Static site built with D3 and Vite
    </p>
    <p>
      Views are organized by project level so the app can grow from character importance into language, relationships, and phrase evolution.
    </p>
  </footer>

  <script type="module" src="/main.js"></script>
